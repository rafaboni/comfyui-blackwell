name: Build and Push Clean

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 9861f69a0ee4500a131dbe168b8b9f75330f0cda

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean build cache
        run: docker buildx prune -f --all

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push (no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: rafaboni/comfyui-blackwell:latest
          build-args: |
            CACHE_DATE=${{ github.run_id }}
          cache-from: type=no
          no-cache-fallback: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

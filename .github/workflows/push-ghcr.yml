name: Push Clean to GHCR

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean build cache
        run: docker buildx prune -f --all

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR (no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/rafaboni/comfyui-blackwell:latest
          build-args: |
            CACHE_DATE=${{ github.run_id }}
          no-cache-fallback: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
